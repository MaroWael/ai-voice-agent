services:
  postgres:
    image: postgres:17
    container_name: voice_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - ${POSTGRES_STORAGE:-./storage/postgres}:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7
    container_name: voice_redis
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - ${REDIS_STORAGE:-./storage/redis}:/data
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.18.0
    container_name: voice_qdrant
    ports:
      - "${QDRANT_HTTP_PORT}:6333"
    volumes:
      - ${QDRANT_STORAGE:-./storage/qdrant}:/qdrant/storage
    restart: unless-stopped

  ollama:
    image: ollama/ollama:0.31.2
    container_name: voice_ollama
    ports:
      - "11434:11434"
    volumes:
      - ${OLLAMA_STORAGE:-./storage/ollama}:/root/.ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 5s
      timeout: 3s
      retries: 5

  ollama-pull-model:
    image: ollama/ollama:0.31.2
    container_name: voice_ollama_pull
    volumes:
      - ${OLLAMA_STORAGE:-./storage/ollama}:/root/.ollama
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - LLM_MODEL=${LLM_MODEL}
    depends_on:
      ollama:
        condition: service_healthy
    restart: "no"
    entrypoint: /bin/sh
    command: ["-c", "ollama list | grep -q '${LLM_MODEL}' || ollama pull ${LLM_MODEL}"]