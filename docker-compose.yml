services:
  postgres:
    image: postgres:17
    container_name: voice_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - ${POSTGRES_STORAGE:-./storage/postgres}:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7
    container_name: voice_redis
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - ${REDIS_STORAGE:-./storage/redis}:/data
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.15.3
    container_name: voice_qdrant
    ports:
      - "${QDRANT_HTTP_PORT}:6333"
    volumes:
      - ${QDRANT_STORAGE:-./storage/qdrant}:/qdrant/storage
    restart: unless-stopped